{% extends 'auth_base.html' %}

{% block title %}Register - BEMS{% endblock %}

{% block subtitle %}Create a new account{% endblock %}

{% block content %}
<form method="POST" action="/register">
    <div class="form-group">
        <label class="form-label">Username</label>
        <input type="text" name="username" class="form-control" placeholder="Choose a username" required autofocus>
    </div>
    
    <div class="form-group">
        <label class="form-label">Email Address</label>
        <input type="email" name="email" class="form-control" placeholder="Enter your email" required>
    </div>
    
    <div class="form-group">
        <label class="form-label">Password</label>
        <input type="password" name="password" class="form-control" placeholder="Create a password" required>
    </div>
    
    <div class="form-group">
        <label class="form-label">Confirm Password</label>
        <input type="password" name="confirm_password" class="form-control" placeholder="Confirm your password" required>
    </div>
    
    <button type="submit" class="btn btn-primary" style="width: 100%; justify-content: center; font-size: 16px; padding: 12px; margin-top: 10px;">Sign Up →</button>
</form>

<div class="auth-footer">
    <p>Already have an account? <a href="/login">Login</a></p>
</div>
{% endblock %}
