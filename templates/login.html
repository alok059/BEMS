{% extends 'auth_base.html' %}

{% block title %}Login - BEMS{% endblock %}

{% block subtitle %}Login to access your dashboard{% endblock %}

{% block content %}
<form method="POST" action="/login">
    <div class="form-group">
        <label class="form-label">Username</label>
        <input type="text" name="username" class="form-control" placeholder="Enter your username" required autofocus>
    </div>
    
    <div class="form-group">
        <label class="form-label">Password</label>
        <input type="password" name="password" class="form-control" placeholder="Enter your password" required>
    </div>
    
    <button type="submit" class="btn btn-primary" style="width: 100%; justify-content: center; font-size: 16px; padding: 12px; margin-top: 10px;">Login →</button>
</form>

<div class="auth-footer">
    <p>Don't have an account? <a href="/register">Sign up</a></p>
    <p style="margin-top: 8px; font-size: 12px; color: #94a3b8;">Contact administrator if you forgot your password</p>
</div>
{% endblock %}
